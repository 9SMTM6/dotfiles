# [ţéÂ](#222f5b)\
# [ţé┤](fg:#d17040)
add_newline = true

# You can also replace your username with a neat symbol like ´äá to save some space
[username]
show_always = true
style_user = "bg:#222f5b"
style_root = "fg:red bg:#222f5b"
format = '[ $user]($style)'

[hostname]
style = "bg:#222f5b"
format = "[$ssh_symbol$hostname]($style)"
ssh_only = false

[directory]
style = "bg:#5a0f35"
format = "[$path]($style)"
truncation_length = 7
truncate_to_repo = false
repo_root_style = "fg:#d17040 bg:#5a0f35"
repo_root_format = "[$before_root_path]($style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style)"
truncation_symbol = "ÔÇŽ/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = " ´ťś "
"Downloads" = "´ÇÖ"
"Music" = "´Çü"
"Pictures" = "´Çż"
"workspace" = " ´¬┤ "
"Workspace" = " ´¬┤ "
"hft" = " ´ą│ "
"private" = " ´źŞ "
"iteratec" = " ´ćş "
# Keep in mind that the order matters. For example:
# "Important Documents" = " ´ťś´ä¬ "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important ´ťś " = " ´ťś´ä¬ "

[fill]
symbol = "-"
style = "bold green"

[c]
symbol = "ţś×"
style = "bg:#2da14c"
format = '[ $symbol ]($style)'

[docker_context]
disabled = true
symbol = "´îł"
style = "bg:#2da14c"
format = '[ $symbol $context ]($style) $path'

[elixir]
symbol = "ţëÁ"
style = "bg:#2da14c"
format = '[ $symbol ]($style)'

[elm]
symbol = "ţśČ"
style = "bg:#2da14c"
format = '[ $symbol ]($style)'

[git_branch]
symbol = "´Éś"
style = "bg:#23598b"
format = '[ $symbol $branch ]($style)'

[git_metrics]
disabled = false
only_nonzero_diffs = false
added_style = "bold fg:green bg:#23598b"
deleted_style = "bold fg:red bg:#23598b"
format = '([+$added ]($added_style))([-$deleted ]($deleted_style))'

[git_status]
style = "bg:#23598b"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = "ţśž"
style = "bg:#2da14c"
format = '[ $symbol ]($style)'

[haskell]
symbol = "ţŁĚ"
style = "bg:#2da14c"
format = '[ $symbol ]($style)'

[java]
symbol = "ţëľ"
style = "bg:#2da14c"
format = '[ $symbol ]($style)'

[julia]
symbol = "ţśĄ"
style = "bg:#2da14c"
format = '[ $symbol ]($style)'

[nodejs]
symbol = "ţťś"
style = "bg:#2da14c"
format = '[ $symbol ]($style)'

[nim]
symbol = "´ÜĄ"
style = "bg:#2da14c"
format = '[ $symbol ]($style)'

[rust]
symbol = "ţ×Ę"
style = "bg:#2da14c"
format = '[ $symbol ]($style)'

[cmd_duration]
style = "bg:#0e1a40"
min_time = 0
format = "[ $duration ]($style)"

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#d17040"
format = '[$time ]($style)'

[shell]
disabled = false
style = "bg:#b80025"
format = '[ $indicator]($style)'