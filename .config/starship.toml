# [ŅéČ](#222f5b)\
# [Ņé┤](fg:#d17040)
add_newline = false

# You can also replace your username with a neat symbol like ’äĀ to save some space
[username]
show_always = true
style_user = "bg:#222f5b"
style_root = "fg:red bg:#222f5b"
format = '[ $user]($style)'

[hostname]
style = "bg:#222f5b"
format = "[$hostname$ssh_symbol]($style)"
ssh_only = false

[directory]
style = "bg:#5a0f35"
format = "[$path]($style)"
truncation_length = 7
truncate_to_repo = false
repo_root_style = "fg:#d17040 bg:#5a0f35"
repo_root_format = "[$before_root_path]($style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style)"
truncation_symbol = "ŌĆ”/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = " ’£ś "
"Dokumente" = " ’£ś "
"Downloads" = "’ĆÖ"
"Music" = "’Ćü"
"Pictures" = "’ĆŠ"
"workspace" = " ’¬┤ "
"Workspace" = " ’¬┤ "
"hft" = " ’ź│ "
"private" = " ’½Ė "
"iteratec" = " ’åŁ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " ’£ś’ä¬ "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important ’£ś " = " ’£ś’ä¬ "

[fill]
symbol = "-"
style = "bold green"

[git_branch]
symbol = "’Éś"
style = "bg:#23598b"
format = '[ $symbol $branch ]($style)'

[git_metrics]
disabled = false
only_nonzero_diffs = false
added_style = "bold fg:green bg:#23598b"
deleted_style = "bold fg:red bg:#23598b"
format = '([+$added ]($added_style))([-$deleted ]($deleted_style))'

[git_status]
style = "bg:#23598b"
format = '[$all_status$ahead_behind ]($style)'

[cmd_duration]
style = "bg:#0e1a40"
min_time = 0
format = "[ $duration ]($style)"

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#d17040"
format = '[$time ]($style)'

[shell]
disabled = false
style = "bg:#b80025"
format = '[ $indicator]($style)'

