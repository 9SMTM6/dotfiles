[@](bg:#222f5b)\
$hostname\
[ţé░ ](bg:#5a0f35 fg:#222f5b)\
$directory\
[ ](bg:#5a0f35 fg:#222f5b)\
[ţé░ ](fg:#5a0f35)\
$fill\
