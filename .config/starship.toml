format = """
$username\
[@](bg:#222f5b)\
$hostname\
[Ņé░ ](bg:#5a0f35 fg:#222f5b)\
$directory\
[ ](bg:#5a0f35 fg:#222f5b)\
[Ņé░ ](fg:#5a0f35)\
$fill\
[ Ņé▓](fg:#23598b)\
$git_branch\
$git_metrics\
$git_status\
[Ņé▓](fg:#2da14c bg:#23598b)\
$c\
$elixir\
